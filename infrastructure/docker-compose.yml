services:
  # 1. PostgreSQL with pgvector (Long-term AI Memory)
  postgres:
    image: ankane/pgvector:latest
    container_name: nexledge-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nexledge
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  # 2. MongoDB (Flexible Chat History storage)
  mongodb:
    image: mongo:7.0
    container_name: nexledge-nosql
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: nexledge
    volumes:
      - ./data/mongo:/data/db

  # 3. Redis (High-speed Caching & Session Management)
  redis:
    image: redis/redis-stack-server:latest
    container_name: nexledge-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  # 4. Kafka in KRaft Mode (Modern, No-Zookeeper Event Bus)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nexledge-events
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'

      # Use the container name (kafka) for the quorum, not localhost
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'

      # Define listeners for all roles
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,EXTERNAL://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'

      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - ./data/kafka:/var/lib/kafka/data
